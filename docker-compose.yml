services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      # ENVIRONMENT: RPC_URL and CHAIN_ID default to Base Sepolia testnet (84532).
      # Override both in production: RPC_URL=https://mainnet.base.org CHAIN_ID=8453
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - CHAIN_ID=${CHAIN_ID:-84532}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - PINATA_JWT=${PINATA_JWT}
      - PINATA_GATEWAY=${PINATA_GATEWAY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://pact.ing}
    depends_on:
      - redis
    # TODO(#123): Enhance healthcheck to verify application-level readiness, not just HTTP reachability.
    # The /health endpoint currently only confirms the HTTP server is up. Consider:
    # (1) Checking database connectivity (Supabase ping) in the health response,
    # (2) Checking RPC connectivity (eth_blockNumber call) to detect chain node failures,
    # (3) Returning a JSON body with { status, db, rpc, uptime } so orchestrators can
    #     distinguish "process running but degraded" from "fully healthy".
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pact-network

  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    environment:
      # ENVIRONMENT: RPC_URL and CHAIN_ID default to Base Sepolia testnet (84532).
      # Override both in production: RPC_URL=https://mainnet.base.org CHAIN_ID=8453
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - CHAIN_ID=${CHAIN_ID:-84532}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-5000}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - PINATA_JWT=${PINATA_JWT}
      - PINATA_GATEWAY=${PINATA_GATEWAY}
    # TODO(#146): Replace pgrep healthcheck with a specific indexer liveness probe.
    # pgrep -f bun only confirms the process is running, not that the indexer is
    # actually processing blocks. Consider exposing a /health HTTP endpoint from the
    # indexer that returns the last processed block number, allowing orchestrators to
    # detect stalled indexers (e.g. block age > 2 * POLLING_INTERVAL_MS).
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'bun']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pact-network

  # LOCAL DEV ONLY: This redis service is for local development and testing.
  # Production uses Upstash Redis REST API (UPSTASH_REDIS_REST_URL / UPSTASH_REDIS_REST_TOKEN).
  # The mcp-server's REDIS_URL env var connects to this container locally; it is NOT used in production.
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pact-network

networks:
  pact-network:
    driver: bridge

volumes:
  redis-data:
