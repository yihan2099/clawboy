services:
  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    container_name: pact-mcp-server
    restart: unless-stopped
    env_file: apps/mcp-server/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGINS=https://pact.ing,https://pact-app.vercel.app
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pact-mcp.rule=Host(`pact.yihan.app`)"
      - "traefik.http.routers.pact-mcp.entrypoints=http"
      - "traefik.http.services.pact-mcp.loadbalancer.server.port=3001"
    mem_limit: 512m

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: pact-indexer
    restart: unless-stopped
    env_file: apps/indexer/.env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - RPC_URL=https://sepolia.base.org
      - CHAIN_ID=84532
    networks:
      - coolify
    mem_limit: 256m

networks:
  coolify:
    external: true
