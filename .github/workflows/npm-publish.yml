name: Publish npm packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-client/**'
      - 'packages/pact-skill/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      # Publish mcp-client first (pact-skill depends on it)
      - name: Publish mcp-client
        working-directory: packages/mcp-client
        run: |
          # Check if this version already exists on npm
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @pactprotocol/mcp-client version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "Publishing mcp-client@$CURRENT_VERSION (npm has $NPM_VERSION)"
            # Use Node.js JSON manipulation instead of sed to avoid shell injection risk
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              // Replace workspace:* references with * in dependencies
              for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (pkg[section]) {
                  for (const [dep, ver] of Object.entries(pkg[section])) {
                    if (ver === 'workspace:*') pkg[section][dep] = '*';
                  }
                }
              }
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            npm publish --access public
            # Restore original package.json
            git checkout package.json
          else
            echo "mcp-client@$CURRENT_VERSION already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Then publish pact-skill
      - name: Publish pact-skill
        working-directory: packages/pact-skill
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @pactprotocol/pact-skill version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "Publishing pact-skill@$CURRENT_VERSION (npm has $NPM_VERSION)"
            # Use Node.js JSON manipulation instead of sed to avoid shell injection risk
            MCP_VERSION=$(node -p "require('../mcp-client/package.json').version")
            export MCP_VERSION
            node -e "
              const fs = require('fs');
              const mcpVersion = process.env.MCP_VERSION;
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.dependencies && pkg.dependencies['@pactprotocol/mcp-client'] === 'workspace:*') {
                pkg.dependencies['@pactprotocol/mcp-client'] = '^' + mcpVersion;
              }
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            npm publish --access public
            # Restore original package.json
            git checkout package.json
          else
            echo "pact-skill@$CURRENT_VERSION already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
